<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <h1>Welcome to Sam's Workout Site</h1>

    <p>Please select which exercise you'd like to do</p>
    <button id="tuesWorkout">Tuesday Workout</button>
    <button id="wedWorkout">Wednesday Workout</button>
    <button id="friWorkout">Friday Workout</button>

    <p>Workout to do:</p>
    <div id="workoutDisplay"></div>

    <h1 id = "exerciseDisplay">"Insert workout here"</h1>
    <h2 id = "timeRemaining"></h2>
    <div id = 'alert'>
        <audio id="alertSound" src="../Files/ping.mp3"></audio>
    </div>
    <div id = "container">
        <div id = "display">
            00:00:00
        </div>
        <div id = "controls">
            <button id = "startBtn" onClick="start()">Start</button>
            <button id = "stopBtn" onClick="stop()">Stop</button>
            <button id = "resetBtn" onClick="reset()">Reset</button>
        </div>
    </div>
    
    <script src="../HTML/index.js"></script>
</body>
</html>
